<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/x-icon" href="img/favicon.png">

	<title>lokalio</title>

	<link rel="stylesheet" href="css/general.css"></style>
	<link rel="stylesheet" href="css/main.css"></style>
	<link rel="stylesheet" href="css/add.css"></style>
	<link rel="stylesheet" href="css/loading.css"></style>
	<link rel="stylesheet" href="css/overview.css"></style>

	<script src="js/error.js" defer></script>
	<script src="js/general.js" defer></script>
	<script src="js/overviewParser.js" defer></script>
	<script src="js/app.js" defer></script>
	<script src="js/add.js" defer></script>
	<script src="js/overview.js" defer></script>
	<script src="js/loading.js" defer></script>

	<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
	<script src="resources/anime.iife.min.js"></script>
	<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
	<main>
		<nav>
			<a href="/" id="logo">
				<img src="img/logo-light.svg" alt="Logo">
			</a>

			<div class="group">
				<a href="/">
					<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="m21 21l-4.34-4.34"/><circle cx="11" cy="11" r="8"/></g></svg>
					<span>Prozkoumat lokaci</span>
				</a>

				<div class="divider"></div>
				
				<a href="#">
					<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2a10 10 0 0 1 7.38 16.75M12 6v6l4 2M2.5 8.875a10 10 0 0 0-.5 3M2.83 16a10 10 0 0 0 2.43 3.4M4.636 5.235a10 10 0 0 1 .891-.857M8.644 21.42a10 10 0 0 0 7.631-.38"/></svg>
					<span>Historie</span>
				</a>
				
				<a href="#">
					<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0zm.894.211v15M9 3.236v15"/></svg>
					<span>Oblasti</span>
				</a>
			</div>

			<div class="group">
				<a href="#">
					<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M14 17H5M19 7h-9"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></g></svg>
					<span>Nastavení</span>
				</a>

				<a href="#">
					<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M18 20a6 6 0 0 0-12 0"/><circle cx="12" cy="10" r="4"/><circle cx="12" cy="12" r="10"/></g></svg>
					<span>Profil</span>
				</a>
			</div>
		</nav>

		<div id="content">
			<div id="add" class="tab active">
				<div id="add-map"></div>

				<div class="wrap">
					<div class="box info">
						<p>Klikněte na požadované místo na mapě, které chcete analyzovat</p>
					</div>

					<div class="box picker">
						<select id="interest-picker" name="interest">
							<option value="" disabled selected>-- Zvolte možnost --</option>
							<option value="student">Student</option>
							<option value="rodic">Rodič</option>
							<option value="pracujici">Pracující</option>
						</select>
					</div>

					<div class="box button" onclick="searchAddress()">Hledej</div>
				</div>
			</div>

			<div id="overview" class="tab">
				<div id="report-map"></div>
				<div id="categories"></div>
			</div>
		</div>
	</main>

	<div id="error-toast" class="hidden">
		<span id="error-message"></span>
		<button onclick="dismissError()">&#10005;</button>
	</div>

	<div id="loading">
		<div id="background">
			<div class="ball"></div>
			<div class="ball"></div>
			<div class="ball"></div>
			<div class="ball"></div>
			<div class="ball"></div>
			<div class="ball"></div>

			<div id="blur"></div>
		</div>

		<div id="rotator">
			<span class="rotating" style="animation: 500ms forwards slide-in;">Pracuji</span>
		</div>
	</div>
</body>
</html>
